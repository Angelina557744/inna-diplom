<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
.feedback-section {
    padding: 4rem 0;
    background: #f8fafc;
    border-radius: 2rem;
    margin: 3rem 0;
}

.feedback-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 1.5rem;
}

.feedback-header {
    text-align: center;
    margin-bottom: 2.5rem;
}

.feedback-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 0.5rem;
}

.feedback-subtitle {
    font-size: 1rem;
    color: #6b7280;
}

.feedback-two-columns {
    display: flex;
    gap: 3rem;
    align-items: flex-start;
}

.feedback-info {
    flex: 1;
    padding-top: 1rem;
}

.info-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 2rem;
}

.info-icon {
    width: 3rem;
    height: 3rem;
    background: rgba(220,38,38,0.1);
    border-radius: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

.info-icon i {
    font-size: 1.3rem;
    color: #dc2626;
}

.info-text h4 {
    font-size: 1rem;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 0.25rem;
}

.info-text p {
    font-size: 0.8rem;
    color: #6b7280;
}

.feedback-form {
    flex: 1;
    background: white;
    padding: 2rem;
    border-radius: 1rem;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.form-field {
    position: relative;
    margin-bottom: 1rem;
}

.form-field-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
    font-size: 0.9rem;
}

.form-control {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.5rem;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.2s;
    background: #f9fafb;
}

.form-control:focus {
    outline: none;
    border-color: #dc2626;
    background: white;
    box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
}

.form-checkbox {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 1.5rem 0;
}

.form-checkbox input {
    width: 1rem;
    height: 1rem;
    cursor: pointer;
    accent-color: #dc2626;
}

.form-checkbox label {
    font-size: 0.85rem;
    color: #4b5563;
    cursor: pointer;
}

.btn-submit-feedback {
    background: #dc2626;
    color: white;
    border: none;
    padding: 0.85rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
}

.btn-submit-feedback:hover {
    background: #b91c1c;
    transform: translateY(-2px);
}

.form-note {
    font-size: 0.7rem;
    color: #9ca3af;
    text-align: center;
    margin-top: 1rem;
    padding-top: 0.5rem;
    border-top: 1px solid #e5e7eb;
}

.form-status-message {
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 0.5rem;
    text-align: center;
    display: none;
}

.form-status-message.success {
    display: block;
    background: #d1fae5;
    color: #065f46;
}

.form-status-message.error {
    display: block;
    background: #fee2e2;
    color: #991b1b;
}

@media (max-width: 768px) {
    .feedback-two-columns {
        flex-direction: column;
        gap: 2rem;
    }
    
    .feedback-info {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }
    
    .info-item {
        flex: 1;
        min-width: 150px;
        margin-bottom: 0;
    }
    
    .feedback-title {
        font-size: 1.5rem;
    }
}

@media (max-width: 640px) {
    .feedback-section {
        padding: 2rem 0;
        margin: 2rem 0;
    }
    
    .feedback-info {
        flex-direction: column;
    }
    
    .info-item {
        margin-bottom: 1rem;
    }
    
    .feedback-form {
        padding: 1.5rem;
    }
}
    </style>


<div class="feedback-section">
    <div class="feedback-container">
        <div class="feedback-header">
            <h2 class="feedback-title">Поможем решить все вопросы</h2>
            <p class="feedback-subtitle">Смело обращайся в деканат. Если боишься напрямую, не стесняйся - пиши!</p>
        </div>
        
        <div class="feedback-two-columns">
            <div class="feedback-info">
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="info-text">
                        <h4>Группа</h4>
                        <p>Укажите вашу учебную группу</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <div class="info-text">
                        <h4>Телефон</h4>
                        <p>Для оперативной связи с вами</p>
                    </div>
                </div>
            </div>
            
            <form class="feedback-form" id="mainFeedbackForm">
                <div class="form-field">
                    <i class="fas fa-user form-field-icon"></i>
                    <input type="text" id="fbName" class="form-control" placeholder="Имя" required>
                </div>
                
                <div class="form-field">
                    <i class="fas fa-users form-field-icon"></i>
                    <input type="text" id="fbGroup" class="form-control" placeholder="Группа" required>
                </div>
                
                <div class="form-field">
                    <i class="fas fa-phone-alt form-field-icon"></i>
                    <input type="tel" id="fbPhone" class="form-control" placeholder="Телефон">
                </div>
                
                <div class="form-field">
                    <i class="fas fa-envelope form-field-icon"></i>
                    <input type="email" id="fbEmail" class="form-control" placeholder="Эл. почта" required>
                </div>
                
                <div class="form-checkbox">
                    <input type="checkbox" id="fbAgree" required>
                    <label for="fbAgree">Я соглашаюсь на обработку персональных данных</label>
                </div>
                
                <button type="submit" class="btn-submit-feedback">Отправить</button>
                <p class="form-note">Нажимая на кнопку, я соглашаюсь с правилами пользования Платформой</p>
            </form>
        </div>
        <div id="feedbackFormStatus" class="form-status-message"></div>
    </div>
</div>





</body>
</html>
